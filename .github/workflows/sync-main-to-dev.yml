name: Sync main to dev

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open-sync-pr:
    name: Open main to dev PR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Create or report sync PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SYNC_PR_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'dev';
            const headBranch = 'main';
            const head = `${owner}:${headBranch}`;

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${headBranch}`,
            });

            if (comparison.data.ahead_by === 0) {
              core.info(`${headBranch} has no commits ahead of ${base}. No sync PR is needed.`);
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.info(`Sync PR already exists: ${pr.html_url}`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `main has new changes ready to sync into dev.\n\nLatest source commit: ${context.sha}`,
              });
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: 'Sync main into dev',
              head,
              base,
              body: [
                'This PR syncs the latest merged changes from main into dev.',
                '',
                `Triggered by: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              maintainer_can_modify: true,
            });

            core.info(`Created sync PR: ${created.data.html_url}`);
